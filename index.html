<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #0d0d0d;
      --s1: #141414;
      --s2: #1a1a1a;
      --s3: #222;
      --brd: rgba(255, 255, 255, 0.07);
      --brd2: rgba(255, 255, 255, 0.12);
      --p: #7c6bea;
      --pd: rgba(124, 107, 234, 0.15);
      --pg: rgba(124, 107, 234, 0.08);
      --tx: #e8e6f0;
      --mt: #8b8a96;
      --ht: #4a4857;
      --gn: #4caf87;
      --am: #d4a030;
      --rd: #c46a5a;
      --tl: #4db6ac;
      --r: 6px;
      --rl: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--tx);
    }

    .app {
      border-radius: var(--rl);
      overflow: hidden;
      min-height: 580px;
    }

    /* TOPBAR */
    .topbar {
      background: var(--s1);
      border-bottom: 1px solid var(--brd);
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      height: 44px;
      gap: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 1.5rem;
    }

    .logo-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .02em;
    }

    .tabs {
      display: flex;
      height: 100%;
      gap: 0;
      flex: 1;
    }

    .tab {
      height: 100%;
      padding: 0 14px;
      font-size: 12.5px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--mt);
      border-bottom: 2px solid transparent;
      transition: all .15s;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .tab:hover {
      color: var(--tx);
    }

    .tab.active {
      color: var(--p);
      border-bottom-color: var(--p);
    }

    /* PANELS */
    .panel {
      display: none;
      padding: 1.25rem;
    }

    .panel.active {
      display: block;
    }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .stat-card {
      background: var(--s1);
      border: 1px solid var(--brd);
      border-radius: var(--r);
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--p);
      opacity: .5;
    }

    .stat-label {
      font-size: 11px;
      color: var(--mt);
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 300;
      color: var(--tx);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -1px;
    }

    /* SECTION HEADER */
    .sec-hdr {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--ht);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sec-hdr::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--brd);
    }

    /* GOAL CARD */
    .goals-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .goal-card {
      background: var(--s1);
      border: 1px solid var(--brd);
      border-radius: var(--rl);
      padding: 14px 16px;
      transition: border-color .15s, background .15s;
    }

    .goal-card:hover {
      border-color: var(--brd2);
      background: var(--s2);
    }

    .goal-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .goal-icon {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      border: 1px solid;
    }

    .goal-body {
      flex: 1;
      min-width: 0;
    }

    .goal-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--tx);
      margin-bottom: 3px;
    }

    .goal-desc {
      font-size: 12px;
      color: var(--mt);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .goal-tags {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--p);
      background: var(--pd);
      border: 1px solid rgba(124, 107, 234, .2);
    }

    .tag-date {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--ht);
    }

    /* METRICS ROW */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }

    .metric-box {
      background: var(--s2);
      border: 1px solid var(--brd);
      border-radius: var(--r);
      padding: 8px 10px;
    }

    .metric-label {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--ht);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .metric-val {
      font-size: 14px;
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
      color: var(--tx);
    }

    .metric-val.pct-val {
      color: var(--p);
    }

    /* PROGRESS */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-track {
      flex: 1;
      height: 3px;
      background: var(--s3);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .4s cubic-bezier(.4, 0, .2, 1);
    }

    .progress-pct {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--mt);
      min-width: 30px;
      text-align: right;
    }

    /* DONE INLINE INPUT */
    .done-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--brd);
    }

    .done-label {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--mt);
      white-space: nowrap;
    }

    .done-input {
      background: var(--s2);
      border: 1px solid var(--brd2);
      border-radius: var(--r);
      color: var(--tx);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 5px 8px;
      width: 90px;
      outline: none;
    }

    .done-input:focus {
      border-color: var(--p);
    }

    .btn-apply {
      padding: 5px 12px;
      font-size: 11.5px;
      font-family: 'Inter', sans-serif;
      border: 1px solid var(--p);
      border-radius: var(--r);
      background: var(--pd);
      cursor: pointer;
      color: var(--p);
      transition: all .15s;
    }

    .btn-apply:hover {
      background: var(--p);
      color: #fff;
    }

    /* GOAL FOOTER */
    .goal-footer {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--brd);
    }

    .btn-ghost {
      padding: 4px 10px;
      font-size: 11.5px;
      font-family: 'Inter', sans-serif;
      border: 1px solid var(--brd2);
      border-radius: 4px;
      background: none;
      cursor: pointer;
      color: var(--mt);
      transition: all .15s;
    }

    .btn-ghost:hover {
      color: var(--tx);
      background: var(--s3);
    }

    .btn-ghost.danger:hover {
      color: var(--rd);
      border-color: rgba(196, 106, 90, .3);
      background: rgba(196, 106, 90, .08);
    }

    .btn-ghost.edit:hover {
      color: var(--am);
      border-color: rgba(212, 160, 48, .3);
      background: rgba(212, 160, 48, .08);
    }

    /* ADD BUTTON */
    .add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border: 1px dashed var(--brd2);
      border-radius: var(--rl);
      background: none;
      cursor: pointer;
      color: var(--ht);
      font-size: 12.5px;
      font-family: 'Inter', sans-serif;
      width: 100%;
      margin-top: 6px;
      transition: all .15s;
    }

    .add-btn:hover {
      color: var(--p);
      border-color: rgba(124, 107, 234, .3);
      background: var(--pg);
    }

    /* FORM */
    .form-panel {
      background: var(--s1);
      border: 1px solid var(--brd);
      border-radius: var(--rl);
      padding: 1.25rem;
      margin-top: 8px;
    }

    .form-section {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--mt);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    input[type=text],
    input[type=number],
    textarea,
    select,
    input[type=date] {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--brd);
      border-radius: var(--r);
      color: var(--tx);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color .15s;
    }

    input[type=text]:focus,
    input[type=number]:focus,
    textarea:focus,
    select:focus,
    input[type=date]:focus {
      border-color: var(--p);
    }

    textarea {
      height: 60px;
      resize: vertical;
    }

    select {
      appearance: none;
      cursor: pointer;
    }

    input[type=number] {
      font-family: 'JetBrains Mono', monospace;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .metrics-hint {
      font-size: 11px;
      color: var(--ht);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 4px;
    }

    .btn-primary {
      background: var(--p);
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: var(--r);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }

    .btn-primary:hover {
      opacity: .85;
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--brd2);
      color: var(--mt);
      padding: 8px 18px;
      border-radius: var(--r);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
    }

    .formula-preview {
      background: var(--s2);
      border: 1px solid var(--brd);
      border-radius: var(--r);
      padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--p);
      margin-top: 8px;
    }

    /* FOCUS */
    .affirmation {
      background: var(--s1);
      border: 1px solid var(--brd);
      border-left: 3px solid var(--p);
      border-radius: 0 var(--r) var(--r) 0;
      padding: 12px 16px;
      margin-bottom: 1.5rem;
      font-size: 13px;
      color: var(--mt);
      line-height: 1.6;
      font-style: italic;
    }

    .focus-wrap {
      max-width: 420px;
      margin: 0 auto;
      text-align: center;
      padding: 1rem 0 2rem;
    }

    .focus-label {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--ht);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .focus-goal-name {
      font-size: 18px;
      font-weight: 500;
      color: var(--tx);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .focus-goal-desc {
      font-size: 13px;
      color: var(--mt);
      margin-bottom: 2rem;
    }

    .timer-display {
      font-size: 64px;
      font-weight: 300;
      font-family: 'JetBrains Mono', monospace;
      color: var(--tx);
      letter-spacing: -3px;
      margin-bottom: 1.5rem;
      line-height: 1;
    }

    .timer-display.running {
      color: var(--p);
    }

    .timer-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .btn-timer {
      padding: 8px 20px;
      font-size: 12.5px;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid var(--brd2);
      border-radius: var(--r);
      background: var(--s1);
      cursor: pointer;
      color: var(--tx);
      transition: all .15s;
      letter-spacing: .04em;
    }

    .btn-timer:hover {
      border-color: var(--p);
      color: var(--p);
    }

    .btn-timer.start {
      background: var(--p);
      border-color: var(--p);
      color: #fff;
    }

    .btn-timer.start:hover {
      opacity: .85;
    }

    /* LOG */
    .log-list {
      display: flex;
      flex-direction: column;
    }

    .log-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--brd);
      align-items: flex-start;
    }

    .log-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .log-text {
      font-size: 13px;
      color: var(--tx);
      margin-bottom: 2px;
    }

    .log-time {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--ht);
    }

    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--ht);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(2px);
    }

    .modal-box {
      background: var(--s1);
      border: 1px solid var(--brd2);
      border-radius: var(--rl);
      padding: 1.5rem;
      width: 90%;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--tx);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-title span {
      color: var(--p);
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L3 7.5L5 16h10l2-8.5L10 2z" fill="rgba(124,107,234,0.3)" stroke="#7c6bea" stroke-width="1" />
          <path d="M10 2L3 7.5h14L10 2z" fill="#7c6bea" opacity="0.6" />
        </svg>
        <span class="logo-name">Goal Vault</span>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('goals')">◈ Цели</button>
        <button class="tab" onclick="switchTab('focus')">◎ Фокус</button>
        <button class="tab" onclick="switchTab('log')">≡ Журнал</button>
      </div>
    </div>

    <!-- ЦЕЛИ -->
    <div id="panel-goals" class="panel active">
      <div class="stats-grid" id="stats"></div>
      <div class="sec-hdr">активные цели</div>
      <div class="goals-list" id="goals-list"></div>
      <button class="add-btn" onclick="openForm()">+ новая цель</button>
    </div>

    <!-- ФОКУС -->
    <div id="panel-focus" class="panel">
      <div id="affirmation-box" class="affirmation"></div>
      <div class="focus-wrap">
        <div class="focus-label">текущая цель</div>
        <div class="focus-goal-name" id="focus-goal-name">Выбери цель ниже</div>
        <div class="focus-goal-desc" id="focus-goal-desc"></div>
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="timer-btns">
          <button class="btn-timer start" onclick="startTimer()">▶ старт</button>
          <button class="btn-timer" onclick="pauseTimer()">⏸ пауза</button>
          <button class="btn-timer" onclick="resetTimer()">↺ сброс</button>
        </div>
        <div style="text-align:left;">
          <label class="form-label">цель для фокуса</label>
          <select id="focus-select" onchange="setFocusGoal()" style="margin-top:5px;"></select>
        </div>
      </div>
    </div>

    <!-- ЖУРНАЛ -->
    <div id="panel-log" class="panel">
      <div class="sec-hdr">история действий</div>
      <div id="log-list" class="log-list"></div>
    </div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО: ДОБАВИТЬ / РЕДАКТИРОВАТЬ -->
  <div id="modal" class="modal-overlay" style="display:none;" onclick="closeModalOutside(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-title">◈ <span id="modal-title-text">Новая цель</span></div>

      <div class="form-section">
        <label class="form-label">Название цели</label>
        <input id="f-title" type="text" placeholder="Например: Запустить MVP за 30 дней">
      </div>
      <div class="form-section">
        <label class="form-label">Описание / Зачем это важно</label>
        <textarea id="f-desc" placeholder="Почему эта цель важна для меня..."></textarea>
      </div>
      <div class="form-grid" style="margin-bottom:12px;">
        <div>
          <label class="form-label">Категория</label>
          <select id="f-cat">
            <option value="work">💼 Работа</option>
            <option value="health">💪 Здоровье</option>
            <option value="learn">📚 Обучение</option>
            <option value="finance">💰 Финансы</option>
            <option value="personal">🌟 Личное</option>
          </select>
        </div>
        <div>
          <label class="form-label">Дедлайн</label>
          <input id="f-deadline" type="date">
        </div>
      </div>

      <div class="sec-hdr" style="margin-bottom:8px;">измерение прогресса</div>
      <div class="form-grid-4">
        <div>
          <label class="form-label">Показатель</label>
          <input id="f-metric" type="text" placeholder="км, кг, $...">
          <div class="metrics-hint">В чём измеряешь</div>
        </div>
        <div>
          <label class="form-label">Результат</label>
          <input id="f-target" type="number" min="0" placeholder="100">
          <div class="metrics-hint">Цель = 100%</div>
        </div>
        <div>
          <label class="form-label">Выполнил</label>
          <input id="f-done" type="number" min="0" placeholder="0">
          <div class="metrics-hint">Текущий факт</div>
        </div>
        <div>
          <label class="form-label">%</label>
          <div class="formula-preview" id="f-pct-preview">0%</div>
          <div class="metrics-hint">Авто</div>
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn-primary" onclick="saveGoal()">Сохранить</button>
        <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      </div>
    </div>
  </div>

  <script>
    const EMOJIS = { work: '💼', health: '💪', learn: '📚', finance: '💰', personal: '🌟' };
    const CAT_COLORS = { work: '#7c6bea', health: '#4caf87', learn: '#9575cd', finance: '#d4a030', personal: '#4db6ac' };
    const AFFIRMATIONS = [
      '"Каждый шаг вперёд — это победа. Ты уже начал двигаться."',
      '"Фокус на прогрессе, не на совершенстве."',
      '"Твои цели реальны. Запиши, действуй, повторяй."',
      '"Сегодня ты ближе к своей цели, чем вчера."',
      '"Маленькие действия каждый день создают большие результаты."'
    ];

    let goals = JSON.parse(localStorage.getItem('gv_goals') || '[]');
    let logs = JSON.parse(localStorage.getItem('gv_logs') || '[]');
    let editingId = null;
    let timerSecs = 25 * 60, timerRunning = false, timerInterval = null;

    function calcPct(target, done) {
      if (!target || target == 0) return 0;
      return Math.min(100, Math.round((done / target) * 100));
    }

    function save() {
      localStorage.setItem('gv_goals', JSON.stringify(goals));
      localStorage.setItem('gv_logs', JSON.stringify(logs));
    }

    function addLog(text, color) {
      logs.unshift({ text, color: color || '#7c6bea', time: new Date().toLocaleString('ru') });
      if (logs.length > 60) logs.pop();
      save();
    }

    function getProgressColor(pct) {
      if (pct >= 100) return '#4caf87';
      if (pct >= 60) return '#7c6bea';
      if (pct >= 30) return '#d4a030';
      return '#8b8a96';
    }

    function renderStats() {
      const done = goals.filter(g => calcPct(g.target, g.done) >= 100).length;
      const avg = goals.length ? Math.round(goals.reduce((s, g) => s + calcPct(g.target, g.done), 0) / goals.length) : 0;
      document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Всего</div><div class="stat-value">${goals.length}</div></div>
    <div class="stat-card"><div class="stat-label">Готово</div><div class="stat-value">${done}</div></div>
    <div class="stat-card"><div class="stat-label">Прогресс</div><div class="stat-value">${avg}%</div></div>`;
    }

    function renderGoals() {
      renderStats();
      const el = document.getElementById('goals-list');
      if (!goals.length) { el.innerHTML = '<div class="empty">// нет целей — добавь первую</div>'; return; }
      el.innerHTML = goals.map((g, i) => {
        const pct = calcPct(g.target, g.done);
        const col = CAT_COLORS[g.cat] || '#7c6bea';
        return `<div class="goal-card" id="gc-${g.id}">
      <div class="goal-top">
        <div class="goal-icon" style="background:${col}22;border-color:${col}33">${EMOJIS[g.cat] || '🎯'}</div>
        <div class="goal-body">
          <div class="goal-title">${g.title}</div>
          ${g.desc ? `<div class="goal-desc">${g.desc}</div>` : ''}
        </div>
      </div>
      <div class="goal-tags">
        <span class="tag">#${g.cat}</span>
        ${g.metric ? `<span class="tag-date">${g.metric}</span>` : ''}
        ${g.deadline ? `<span class="tag-date">→ ${g.deadline}</span>` : ''}
      </div>
      <div class="metrics-row">
        <div class="metric-box">
          <div class="metric-label">Показатель</div>
          <div class="metric-val">${g.metric || '—'}</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">Результат</div>
          <div class="metric-val">${g.target ?? '—'}</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">Выполнил</div>
          <div class="metric-val">${g.done ?? 0}</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">%</div>
          <div class="metric-val pct-val">${pct}%</div>
        </div>
      </div>
      <div class="progress-row">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${getProgressColor(pct)}"></div></div>
        <div class="progress-pct">${pct}%</div>
      </div>
      <div class="done-input-row">
        <span class="done-label">Обновить «Выполнил»:</span>
        <input class="done-input" type="number" min="0" id="dinput-${g.id}" value="${g.done ?? 0}" placeholder="0">
        <button class="btn-apply" onclick="applyDone(${g.id})">Применить</button>
      </div>
      <div class="goal-footer">
        <button class="btn-ghost edit" onclick="openEdit(${g.id})">✎ изменить</button>
        <button class="btn-ghost danger" onclick="deleteGoal(${g.id})">✕ удалить</button>
      </div>
    </div>`;
      }).join('');
    }

    function applyDone(id) {
      const g = goals.find(x => x.id === id); if (!g) return;
      const val = parseFloat(document.getElementById('dinput-' + id).value) || 0;
      g.done = val;
      const pct = calcPct(g.target, g.done);
      addLog(`"${g.title}" → выполнено: ${val} ${g.metric || ''} (${pct}%)`, '#7c6bea');
      save(); renderGoals();
    }

    function deleteGoal(id) {
      const g = goals.find(x => x.id === id); if (!g) return;
      addLog('Удалена цель: ' + g.title, '#c46a5a');
      goals = goals.filter(x => x.id !== id);
      save(); renderGoals(); renderFocus();
    }

    /* MODAL */
    function openForm() {
      editingId = null;
      document.getElementById('modal-title-text').textContent = 'Новая цель';
      document.getElementById('f-title').value = '';
      document.getElementById('f-desc').value = '';
      document.getElementById('f-cat').value = 'work';
      document.getElementById('f-deadline').value = '';
      document.getElementById('f-metric').value = '';
      document.getElementById('f-target').value = '';
      document.getElementById('f-done').value = '0';
      document.getElementById('f-pct-preview').textContent = '0%';
      document.getElementById('modal').style.display = 'flex';
      setupFormulaPreview();
    }

    function openEdit(id) {
      const g = goals.find(x => x.id === id); if (!g) return;
      editingId = id;
      document.getElementById('modal-title-text').textContent = 'Редактировать цель';
      document.getElementById('f-title').value = g.title || '';
      document.getElementById('f-desc').value = g.desc || '';
      document.getElementById('f-cat').value = g.cat || 'work';
      document.getElementById('f-deadline').value = g.deadline || '';
      document.getElementById('f-metric').value = g.metric || '';
      document.getElementById('f-target').value = g.target ?? '';
      document.getElementById('f-done').value = g.done ?? 0;
      const pct = calcPct(g.target, g.done);
      document.getElementById('f-pct-preview').textContent = pct + '%';
      document.getElementById('modal').style.display = 'flex';
      setupFormulaPreview();
    }

    function setupFormulaPreview() {
      const upd = () => {
        const t = parseFloat(document.getElementById('f-target').value) || 0;
        const d = parseFloat(document.getElementById('f-done').value) || 0;
        document.getElementById('f-pct-preview').textContent = calcPct(t, d) + '%';
      };
      document.getElementById('f-target').oninput = upd;
      document.getElementById('f-done').oninput = upd;
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function closeModalOutside(e) { if (e.target === document.getElementById('modal')) closeModal(); }

    function saveGoal() {
      const title = document.getElementById('f-title').value.trim();
      if (!title) { alert('Введи название цели'); return; }
      const target = parseFloat(document.getElementById('f-target').value) || 0;
      const done = parseFloat(document.getElementById('f-done').value) || 0;
      if (editingId) {
        const g = goals.find(x => x.id === editingId);
        if (g) {
          g.title = title; g.desc = document.getElementById('f-desc').value.trim();
          g.cat = document.getElementById('f-cat').value; g.deadline = document.getElementById('f-deadline').value;
          g.metric = document.getElementById('f-metric').value.trim(); g.target = target; g.done = done;
          addLog('Изменена цель: ' + title, '#d4a030');
        }
      } else {
        goals.push({
          id: Date.now(), title, desc: document.getElementById('f-desc').value.trim(),
          cat: document.getElementById('f-cat').value, deadline: document.getElementById('f-deadline').value,
          metric: document.getElementById('f-metric').value.trim(), target, done
        });
        addLog('Добавлена цель: ' + title, '#4caf87');
      }
      save(); closeModal(); renderGoals(); renderFocus();
    }

    /* FOCUS */
    function renderFocus() {
      const sel = document.getElementById('focus-select');
      sel.innerHTML = goals.length ? goals.map(g => `<option value="${g.id}">${EMOJIS[g.cat]} ${g.title}</option>`).join('') : '<option>— нет целей —</option>';
      setFocusGoal();
      document.getElementById('affirmation-box').textContent = AFFIRMATIONS[Math.floor(Math.random() * AFFIRMATIONS.length)];
    }

    function setFocusGoal() {
      const id = parseInt(document.getElementById('focus-select').value);
      const g = goals.find(x => x.id === id);
      document.getElementById('focus-goal-name').textContent = g ? g.title : 'Нет целей';
      document.getElementById('focus-goal-desc').textContent = g ? (g.desc || '') : '';
    }

    function updateTimerDisplay() {
      const m = Math.floor(timerSecs / 60), s = timerSecs % 60;
      document.getElementById('timer-display').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function startTimer() {
      if (timerRunning) return; timerRunning = true;
      document.getElementById('timer-display').classList.add('running');
      timerInterval = setInterval(() => {
        timerSecs--;
        if (timerSecs < 0) {
          clearInterval(timerInterval); timerRunning = false;
          document.getElementById('timer-display').classList.remove('running');
          timerSecs = 25 * 60;
          const id = parseInt(document.getElementById('focus-select').value);
          const g = goals.find(x => x.id === id);
          if (g) addLog('Фокус-сессия: ' + g.title, '#7c6bea');
          renderLog(); alert('Сессия завершена! Сделай перерыв.');
        }
        updateTimerDisplay();
      }, 1000);
    }

    function pauseTimer() { clearInterval(timerInterval); timerRunning = false; document.getElementById('timer-display').classList.remove('running'); }
    function resetTimer() { pauseTimer(); timerSecs = 25 * 60; updateTimerDisplay(); }

    /* LOG */
    function renderLog() {
      const el = document.getElementById('log-list');
      if (!logs.length) { el.innerHTML = '<div class="empty">// журнал пуст</div>'; return; }
      el.innerHTML = logs.map(l => `<div class="log-item">
    <div class="log-dot" style="background:${l.color}"></div>
    <div><div class="log-text">${l.text}</div><div class="log-time">${l.time}</div></div>
  </div>`).join('');
    }

    /* TABS */
    function switchTab(name) {
      ['goals', 'focus', 'log'].forEach(n => {
        document.querySelectorAll('.tab')[['goals', 'focus', 'log'].indexOf(n)].classList.toggle('active', n === name);
        document.getElementById('panel-' + n).classList.toggle('active', n === name);
      });
      if (name === 'focus') renderFocus();
      if (name === 'log') renderLog();
    }

    renderGoals();
  </script>
</body>

</html>
